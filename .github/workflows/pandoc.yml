# Simple workflow for Pandoc generation and deployment of static content to GitHub Pages
name: Pandoc generate and deploy HTML/PDF docs (acal-core-v1.0, acal-xpath-v1.0) to OASIS Github Pages site

on:
  # Runs on pushes targeting the main branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: List files in the repository
        run: |
          ls ${{ github.workspace }}
          mkdir output
      - name: Pandoc HTML generation (acal-core-v1.0)
        uses: docker://cdang/pandoc-plantuml
        with:
          args: >-
            -f gfm+definition_lists
            -t html
            -c pandoc/styles/markdown-styles-v1.7.3a.css
            --standalone
            --template pandoc/templates/default.html
            --lua-filter pandoc/meta_vars.lua
            --defaults pandoc/defaults.yaml
            --embed-resources
            --metadata title=" "
            --output output/acal-core-v1.0-draft.html
            acal-core-v1.0.md

      # acal-xpath-v1.0.md is built via pandoc/mkdocs.sh (not the cdang/pandoc-plantuml
      # container above) because mkdocs.sh requires `git` on PATH and the container's
      # pandoc/extra base image doesn't include it. --number-lines is REQUIRED here: this
      # document's {.numberLines} fenced-code-attribute syntax only parses under
      # fenced_code_attributes, which mkdocs.sh only enables with that flag (see #109).
      - name: Setup Pandoc (for acal-xpath-v1.0 mkdocs.sh build)
        uses: r-lib/actions/setup-pandoc@v2
        with:
          pandoc-version: '3.2.1'
      - name: Install pandoc-include and diagram tools (for acal-xpath-v1.0 mkdocs.sh build)
        run: |
          pipx install "pandoc-include==1.4.*"
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y graphviz default-jre-headless plantuml
      - name: Pandoc HTML generation (acal-xpath-v1.0)
        run: |
          pandoc/mkdocs.sh --number-lines --output output acal-xpath-v1.0.md
          mv output/acal-xpath-v1.0.html output/acal-xpath-v1.0-draft.html

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v2
      - name: Pandoc PDF generation (acal-core-v1.0)
        run: |
          chrome --headless=new --no-sandbox --no-pdf-header-footer --print-to-pdf="output/acal-core-v1.0-draft.pdf" output/acal-core-v1.0-draft.html
      - name: Pandoc PDF generation (acal-xpath-v1.0)
        run: |
          chrome --headless=new --no-sandbox --no-pdf-header-footer --print-to-pdf="output/acal-xpath-v1.0-draft.pdf" output/acal-xpath-v1.0-draft.html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload output folder
          path: "output"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      - name: summary
        run: |
          echo "### Check the results:" >> $GITHUB_STEP_SUMMARY
          echo "- acal-core-v1.0: https://oasis-tcs.github.io/xacml-spec/acal-core-v1.0-draft.html | https://oasis-tcs.github.io/xacml-spec/acal-core-v1.0-draft.pdf" >> $GITHUB_STEP_SUMMARY
          echo "- acal-xpath-v1.0: https://oasis-tcs.github.io/xacml-spec/acal-xpath-v1.0-draft.html | https://oasis-tcs.github.io/xacml-spec/acal-xpath-v1.0-draft.pdf" >> $GITHUB_STEP_SUMMARY
