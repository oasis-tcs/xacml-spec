$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "yacal-root-structure-example-using-xpath-and-jsonpath-profiles.schema.yaml"
title: "YACAL root composition schema using XPath and JSONPath profiles"
description: >
  Example root schema for an implementation that supports core YACAL plus the
  XPath and JSONPath profile extensions.
$defs:
  EnabledStructuredValueTypeExtensions:
    $dynamicAnchor: "StructuredValueTypeExtensions"
    anyOf:
      - $ref: "acal-xpath-yaml-v1.0-structure.schema.yaml#/$defs/XPathStructuredValueTypeExtension"

  EnabledPolicyDefaultsTypeExtensions:
    $dynamicAnchor: "PolicyDefaultsTypeExtensions"
    anyOf:
      - $ref: "acal-xpath-yaml-v1.0-structure.schema.yaml#/$defs/XPathPolicyDefaultsTypeExtension"

  EnabledRequestDefaultsTypeExtensions:
    $dynamicAnchor: "RequestDefaultsTypeExtensions"
    anyOf:
      - $ref: "acal-xpath-yaml-v1.0-structure.schema.yaml#/$defs/XPathRequestDefaultsTypeExtension"

  EnabledAttributeSelectorTypeExtensions:
    $dynamicAnchor: "AttributeSelectorTypeExtensions"
    anyOf:
      - $ref: "acal-xpath-yaml-v1.0-structure.schema.yaml#/$defs/XPathAttributeSelectorTypeExtension"
      - $ref: "acal-jsonpath-yaml-v1.0-structure.schema.yaml#/$defs/JSONPathAttributeSelectorTypeExtension"

  EnabledEntityAttributeSelectorTypeExtensions:
    $dynamicAnchor: "EntityAttributeSelectorTypeExtensions"
    anyOf:
      - $ref: "acal-xpath-yaml-v1.0-structure.schema.yaml#/$defs/XPathEntityAttributeSelectorTypeExtension"
      - $ref: "acal-jsonpath-yaml-v1.0-structure.schema.yaml#/$defs/JSONPathEntityAttributeSelectorTypeExtension"

$ref: "acal-core-yaml-v1.0-structure.schema.yaml"
